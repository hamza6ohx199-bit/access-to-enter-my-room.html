<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الغرفة - نظام متطور</title>
    <style>
        /* * ==========================================
         * إعدادات النظام الأساسية والتصفير
         * ==========================================
         */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #0f0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* * ==========================================
         * خلفية الماتريكس المتحركة (Canvas)
         * ==========================================
         */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
        }

        /* * ==========================================
         * الواجهة الزجاجية المركزية (Glassmorphism)
         * ==========================================
         */
        .dashboard-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 20, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2), inset 0 0 20px rgba(0, 255, 0, 0.1);
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* النصوص والعناوين */
        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .status-badge {
            display: inline-block;
            background: rgba(0, 255, 0, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #0f0;
            font-size: 1.2em;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        /* * ==========================================
         * شاشة الأوامر الوهمية (Terminal)
         * ==========================================
         */
        .terminal-box {
            background: #050505;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            text-align: left;
            direction: ltr;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 10px #000;
            margin-bottom: 30px;
        }
        .terminal-text {
            color: #0f0;
            font-size: 1.1em;
            line-height: 1.5;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #0f0;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* * ==========================================
         * شريط المهام السفلي (Dock UI)
         * ==========================================
         */
        .dock-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dock-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #111, #333);
            border-radius: 15px;
            border: 1px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .dock-icon:hover {
            transform: scale(1.4) translateY(-10px);
            background: linear-gradient(45deg, #0f0, #060);
            border-color: #0f0;
            box-shadow: 0 10px 20px rgba(0, 255, 0, 0.4);
            z-index: 100;
        }

        /* تكرار للأكواد لزيادة حجم الملف حسب الطلب */
        /* ... يمكنك إضافة مئات الأسطر من التنسيقات هنا ... */
        .extra-style-1 { display: none; }
        .extra-style-2 { display: none; }
        .extra-style-3 { display: none; }
        .extra-style-4 { display: none; }
        .extra-style-5 { display: none; }
        /* ------------------------------------------------ */

    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="dashboard-container">
        <h1>لوحة القيادة العليا 👑</h1>
        <div class="status-badge" id="roomDisplay">
            جاري فحص الاتصال بالغرفة...
        </div>

        <div class="terminal-box" id="terminalBox">
            <span class="terminal-text" id="typewriter"></span><span class="cursor"></span>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock-icon" title="الإعدادات">⚙️</div>
        <div class="dock-icon" title="الرسائل">💬</div>
        <div class="dock-icon" title="الكاميرات">📷</div>
        <div class="dock-icon" title="الخروج" onclick="window.location.href='index.html'">🚪</div>
    </div>

    <script>
        /* * ==========================================
         * نظام قراءة رقم الغرفة من الرابط
         * ==========================================
         */
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');
        const roomDisplay = document.getElementById('roomDisplay');
        
        if(room) {
            roomDisplay.innerHTML = "🟢 تم تسجيل الدخول بنجاح لغرفة رقم: <b>" + room + "</b>";
        } else {
            roomDisplay.innerHTML = "🔴 تحذير: محاولة اختراق! لم يتم العثور على رقم الغرفة.";
            roomDisplay.style.borderColor = "red";
            roomDisplay.style.color = "red";
            roomDisplay.style.boxShadow = "0 0 15px rgba(255, 0, 0, 0.5)";
        }

        /* * ==========================================
         * محرك الماتريكس للخلفية (Matrix Rain Engine)
         * ==========================================
         */
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        /* * ==========================================
         * نظام الكتابة التلقائية في التيرمينال (Typewriter)
         * ==========================================
         */
        const terminalText = [
            "Initiating secure connection...",
            "Bypassing firewall...",
            "Access granted to Room: " + (room ? room : "UNKNOWN"),
            "Loading administrative privileges...",
            "Decrypting databases...",
            "Welcome Admin. System is fully operational."
        ];
        
        let lineIndex = 0;
        let charIndex = 0;
        const typewriterElement = document.getElementById('typewriter');
        const terminalBox = document.getElementById('terminalBox');

        function typeWriter() {
            if (lineIndex < terminalText.length) {
                if (charIndex < terminalText[lineIndex].length) {
                    typewriterElement.innerHTML += terminalText[lineIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 50); // سرعة الكتابة
                } else {
                    typewriterElement.innerHTML += "<br>";
                    charIndex = 0;
                    lineIndex++;
                    terminalBox.scrollTop = terminalBox.scrollHeight;
                    setTimeout(typeWriter, 500); // وقت الانتظار بين السطور
                }
            }
        }
        
        // تشغيل نظام الكتابة بعد ثانية من فتح الصفحة
        setTimeout(typeWriter, 1000);

        /* * ==========================================
         * نهاية الأكواد الأساسية
         * يمكن إضافة المزيد من الدوال المعقدة هنا لزيادة عدد الأسطر
         * ==========================================
         */
    </script>
</body>
</html>
